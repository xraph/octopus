# Nginx configuration for mock upstream services

server {
    listen 80;
    server_name _;

    # Health check endpoint
    location /health {
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # Echo endpoint - returns request info
    location /echo {
        add_header Content-Type application/json;
        return 200 '{
            "method": "$request_method",
            "uri": "$request_uri",
            "host": "$http_host",
            "remote_addr": "$remote_addr"
        }';
    }

    # Slow endpoint - simulates slow response
    location /slow {
        add_header Content-Type text/plain;
        echo_sleep 2.0;
        echo "slow response";
    }

    # Large response endpoint
    location /large {
        add_header Content-Type text/plain;
        return 200 "This is a large response that repeats many times to test body streaming and memory usage. Lorem ipsum dolor sit amet, consectetur adipiscing elit. ";
    }

    # API endpoints for testing
    location /api {
        add_header Content-Type application/json;
        return 200 '{"status": "ok", "timestamp": "$time_iso8601"}';
    }

    # Default response
    location / {
        add_header Content-Type text/plain;
        return 200 "Mock upstream service\n";
    }
}
