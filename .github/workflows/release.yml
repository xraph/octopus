name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: octopus-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: octopus-linux-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: octopus-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: octopus-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: octopus-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Install protobuf (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protobuf (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin octopus

      - name: Stage binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/octopus.exe" "${{ matrix.asset_name }}"
          else
            strip "target/${{ matrix.target }}/release/octopus" || true
            cp "target/${{ matrix.target }}/release/octopus" "${{ matrix.asset_name }}"
          fi

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          fail_on_unmatched_files: true

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Publish octopus-core
        run: cd crates/octopus-core && cargo publish --token ${{ secrets.CARGO_TOKEN }}

      # Add other crates as they're ready
      # - name: Publish octopus-router
      #   run: cd crates/octopus-router && cargo publish --token ${{ secrets.CARGO_TOKEN }}
