# Custom dist publish-job: publish library crates to crates.io.
# Invoked by the dist-generated release workflow (see dist-workspace.toml
# `publish-jobs`) in the publish stage, after artifacts are built and hosted.
name: Publish (crates.io)

on:
  workflow_call:
    # dist passes the release plan (dist-manifest JSON) to every custom job and
    # invokes us with `secrets: inherit`, so repo secrets are available directly.
    inputs:
      plan:
        required: true
        type: string

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Publish octopus-core
        env:
          # cargo reads CARGO_REGISTRY_TOKEN from the environment automatically.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN not set — skipping crates.io publish."
            exit 0
          fi
          cargo publish -p octopus-core

      # Add other crates here as they become publishable, in dependency order.
      # - run: cargo publish -p octopus-router
