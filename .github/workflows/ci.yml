name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Nightly: exercise the expensive legs (macOS, nightly toolchain, coverage)
    # off the PR path so per-PR feedback stays fast.
    - cron: '0 6 * * *'

# Cancel superseded runs on the same ref so rapid pushes don't pile up full
# pipelines. Never cancel on the default branch (we want every main build).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===========================================================================
  # Code Quality Checks  (required gate — runs on every push/PR)
  # ===========================================================================

  lint:
    name: Lint (rustfmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Swatinem/rust-cache caches the registry index, downloaded crates, git
      # deps and the target dir, so no separate actions/cache steps are needed.
      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Check formatting
        run: make fmt

      - name: Run clippy
        run: make clippy

  # ===========================================================================
  # Security Audit  (required gate)
  # ===========================================================================

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Prebuilt binary (seconds) instead of `cargo install` from source (mins).
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run security audit
        run: make audit

  # ===========================================================================
  # Build & Test  (required gate — fast PR path: ubuntu + stable only)
  # ===========================================================================

  test:
    name: Test (ubuntu / stable)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Build
        run: make build

      - name: Run tests
        run: make test

      - name: Check vendored Helm CRDs are up to date
        run: |
          cargo run -q --all-features --bin octopus -- crd > /tmp/octopus-crds.yaml
          if ! diff -u deploy/helm/octopus/crds/octopus-crds.yaml /tmp/octopus-crds.yaml; then
            echo "::error::Vendored Helm CRDs are stale. Regenerate with: octopus crd > deploy/helm/octopus/crds/octopus-crds.yaml"
            exit 1
          fi

      - name: Build examples
        run: cargo build --examples --all-features

  # ===========================================================================
  # Extended Test Matrix  (macOS + nightly — main pushes & nightly cron only)
  # ===========================================================================

  test-extended:
    name: Test Extended (${{ matrix.os }} / ${{ matrix.rust }})
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust: stable
          - os: ubuntu-latest
            rust: nightly
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Build
        run: make build

      - name: Run tests
        run: make test

  # ===========================================================================
  # Test Coverage  (main pushes & nightly cron only — non-blocking)
  # ===========================================================================

  coverage:
    name: Code Coverage
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      # Prebuilt binary instead of `cargo install cargo-tarpaulin` from source.
      - name: Install tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests with coverage
        run: cargo tarpaulin --out Xml --all-features

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  # ===========================================================================
  # Benchmarks  (main pushes only)
  # ===========================================================================

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: make bench-criterion

      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion

  # ===========================================================================
  # Build Release Binaries  (main pushes only — release.yml owns tag artifacts)
  # ===========================================================================

  build-release:
    name: Build Release (${{ matrix.target }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin octopus

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: strip target/${{ matrix.target }}/release/octopus

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: octopus-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/octopus

  # ===========================================================================
  # Docker Build  (push events only — validates the Dockerfile, pushes on main)
  # ===========================================================================

  docker:
    name: Docker Build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=edge,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # ===========================================================================
  # Documentation  (main pushes only)
  # ===========================================================================

  docs:
    name: Documentation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: make docs

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: target/doc

  # ===========================================================================
  # Required Check Gate
  #
  # Only the fast jobs gate merges. The heavy jobs (coverage, build-release,
  # docker, docs, bench) run on main/schedule and are intentionally NOT
  # required, so they never block or slow down a PR.
  # ===========================================================================

  ci-success:
    name: CI Success
    needs: [lint, audit, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify required jobs succeeded
        run: |
          for result in \
            "lint:${{ needs.lint.result }}" \
            "audit:${{ needs.audit.result }}" \
            "test:${{ needs.test.result }}"; do
            name="${result%%:*}"; status="${result##*:}"
            if [[ "$status" != "success" ]]; then
              echo "::error::Required CI job '$name' did not succeed (result: $status)"
              exit 1
            fi
          done
          echo "All required CI jobs passed!"
