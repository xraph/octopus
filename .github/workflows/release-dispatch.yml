# Manual release trigger.
#
# The cargo-dist release workflow (release.yml) fires on a `vX.Y.Z` tag push AND
# requires the workspace version to match the tag (otherwise: "this workspace
# doesn't have anything for dist to Release!"). This wrapper lets you cut a
# release from the Actions UI ("Run workflow") or
# `gh workflow run release-dispatch.yml -f tag=vX.Y.Z`: it bumps the workspace
# version in Cargo.toml to match the tag, commits that to the branch, then
# creates and pushes the tag — which triggers release.yml.
#
# IMPORTANT: a tag pushed with the default GITHUB_TOKEN does NOT trigger other
# workflows, so the push must use a PAT — CUSTOM_GITHUB_TOKEN — with `repo`
# (contents: write) and `workflow` scope so the tag push triggers release.yml
# and runs the full publish pipeline (docker, helm, cargo, homebrew, …).
name: Release (dispatch)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.2.3)'
        required: true
        type: string
      ref:
        description: 'Branch or commit SHA to tag (default: this branch)'
        required: false
        type: string
        default: ''

jobs:
  tag-and-release:
    name: Create + push release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DISPATCH_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN || secrets.RELEASE_DISPATCH_TOKEN || secrets.GORELEASER_TOKEN }}
      TAG: ${{ inputs.tag }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Require a PAT
        run: |
          set -euo pipefail
          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "::error::No CUSTOM_GITHUB_TOKEN secret set. A tag pushed with the default GITHUB_TOKEN can't trigger release.yml, so this wrapper needs a PAT with repo + workflow scope."
            exit 1
          fi

      - name: Validate tag format
        run: |
          set -euo pipefail
          if ! printf '%s' "$TAG" | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::Tag '$TAG' is not a semver-style version (expected vX.Y.Z, e.g. v1.2.3)."
            exit 1
          fi

      - name: Checkout (with PAT so the tag push triggers release.yml)
        uses: actions/checkout@v4
        with:
          token: ${{ env.DISPATCH_TOKEN }}
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Bump version, tag, and push
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on origin. Pick a new version or delete the tag first."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # cargo-dist requires [workspace.package].version to equal the tag
          # version, so bump it to match before tagging.
          VERSION="${TAG#v}"
          awk -v v="$VERSION" '
            /^\[/ { inwp = ($0 == "[workspace.package]") }
            inwp && /^version[[:space:]]*=/ && !done { sub(/"[^"]*"/, "\"" v "\""); done = 1 }
            { print }
          ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml

          if git diff --quiet -- Cargo.toml; then
            echo "Workspace version already $VERSION — no bump commit needed."
          else
            BRANCH="$(git rev-parse --abbrev-ref HEAD)"
            [ "$BRANCH" = "HEAD" ] && BRANCH="$DEFAULT_BRANCH"
            git add Cargo.toml
            git commit -m "chore(release): $TAG"
            git push origin "HEAD:$BRANCH"
            echo "Bumped workspace version to $VERSION and pushed to $BRANCH."
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Pushed $TAG — the Release workflow will now run on the tag push."
