[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# release.yml is hand-tuned (the reusable publish jobs need explicit `contents`
# permissions that `dist generate` doesn't emit), so don't fail the run when the
# committed CI differs from dist's freshly-generated output.
allow-dirty = ["ci"]
# The installers to generate for each app. (No powershell: Windows is built
# best-effort outside the cargo-dist matrix — see publish-windows.yml — so it
# can fail without blocking the release, which cargo-dist's own matrix can't do.)
installers = ["shell", "homebrew"]
# Publish the generated Homebrew formula to our tap.
tap = "xraph/homebrew-tap"
# Publish stage: built-in homebrew tap push + our custom jobs (one unified run).
# publish-windows is the optional/best-effort Windows binary (continue-on-error).
publish-jobs = ["homebrew", "./publish-crates", "./publish-docker", "./publish-helm", "./publish-windows"]
# Target platforms cargo-dist builds (must all succeed). Windows is intentionally
# NOT here — it's built best-effort in publish-windows.yml.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
