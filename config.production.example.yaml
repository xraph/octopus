# ============================================================================
# Octopus API Gateway — Production Configuration Example
# ============================================================================
#
# A battle-ready config combining all features for a real deployment.
# Uses environment variables for secrets: ${VAR} or ${VAR:-default}
#
# Start with:
#   octopus serve -c config.production.example.yaml
#
# Or split across files:
#   octopus serve -c config/ (loads all YAML in directory, alphabetically)
#   octopus serve -c base.yaml -c production.yaml -c secrets.yaml
#
# ============================================================================

gateway:
  listen: "${GATEWAY_LISTEN:-0.0.0.0:8080}"
  workers: 0                                   # Auto-detect CPU cores
  request_timeout: 30s
  shutdown_timeout: 60s                        # Wait for WebSocket/SSE
  max_body_size: 52428800                      # 50 MB

  tls:
    cert_file: "${TLS_CERT_FILE:-/etc/octopus/tls/cert.pem}"
    key_file: "${TLS_KEY_FILE:-/etc/octopus/tls/key.pem}"
    min_tls_version: "1.2"
    enable_cert_reload: true
    reload_interval_secs: 3600

  compression:
    enabled: true
    level: 6
    min_size: 1024
    algorithms: [br, zstd, gzip]

# ============================================================================
# Auth Providers
# ============================================================================
auth_providers:
  # Primary JWT for user-facing APIs
  primary-jwt:
    type: jwt
    secret: "${JWT_SECRET}"
    algorithm: HS256
    issuer: "${JWT_ISSUER:-my-app}"
    audience: "${JWT_AUDIENCE:-api}"

  # OIDC for SSO login flows
  google-oidc:
    type: oidc
    issuer_url: "https://accounts.google.com"
    audience: "${GOOGLE_CLIENT_ID}"
    jwks_refresh_interval: 1h
    required_scopes: [openid, email]

  # API keys for partner integrations
  partner-keys:
    type: api_key
    header_name: "X-API-Key"
    keys:
      - key: "${PARTNER_ACME_KEY}"
        name: "Acme Corp"
        scopes: [read, write]
      - key: "${PARTNER_GLOBEX_KEY}"
        name: "Globex Inc"
        scopes: [read]

  # Service-to-service auth via forward auth
  internal-auth:
    type: forward_auth
    endpoint: "http://auth-service:8080/verify"
    forward_headers: [Authorization, X-Service-Token]
    response_headers: [X-Auth-User, X-Auth-Roles]
    timeout: 3s
    cache_ttl: 120s

# ============================================================================
# Auth & Authorization
# ============================================================================
auth:
  default_provider: "primary-jwt"
  global_enforce: true
  skip_paths:
    - "/health"
    - "/ready"
    - "/metrics"
    - "/docs/*"
    - "/api/public/*"
  principal_header: "X-Auth-Principal"
  roles_header: "X-Auth-Roles"
  scopes_header: "X-Auth-Scopes"
  token_cache_ttl: 120s

  authz:
    engine: rhai
    global_rules:
      - name: "block-suspended"
        rule: '!principal.attributes.contains("suspended")'
        action: deny

# ============================================================================
# CORS
# ============================================================================
cors:
  allowed_origins:
    - "https://${APP_DOMAIN:-app.example.com}"
    - "https://${ADMIN_DOMAIN:-admin.example.com}"
  allowed_methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
  allowed_headers: [content-type, authorization, x-request-id, x-api-key]
  exposed_headers: [x-request-id, x-rate-limit-remaining]
  allow_credentials: true
  max_age: 7200

# ============================================================================
# Admin Dashboard
# ============================================================================
admin:
  auth_provider: "primary-jwt"

# ============================================================================
# FARP — Federated API Route Protocol
# ============================================================================
farp:
  enabled: ${FARP_ENABLED:-true}
  watch_interval: 10s
  schema_cache_ttl: 5m

  discovery:
    backends: []
    # Uncomment your discovery backend:
    #
    # Kubernetes:
    # - type: kubernetes
    #   config:
    #     namespace: "${K8S_NAMESPACE:-default}"
    #     label_selector: "octopus.dev/farp=enabled"
    #
    # Consul:
    # - type: consul
    #   config:
    #     address: "${CONSUL_ADDR:-localhost:8500}"
    #     datacenter: "${CONSUL_DC:-dc1}"
    #     token: "${CONSUL_TOKEN:-}"

# ============================================================================
# Routes
# ============================================================================
routes:
  # ── Public (no auth) ────────────────────────────────────────────────────
  - path: "/api/public/*"
    methods: [GET]
    upstream: api-service
    skip_auth: true
    strip_prefix: "/api/public"
    cors:
      allowed_origins: ["*"]
      allow_credentials: false
      max_age: 86400
    rate_limit:
      requests_per_window: 500
      window_size: 60s

  # ── User API ────────────────────────────────────────────────────────────
  - path: "/api/v1/*"
    methods: [GET, POST, PUT, DELETE, PATCH]
    upstream: api-service
    strip_prefix: "/api/v1"
    require_roles: [user]
    rate_limit:
      requests_per_window: 200
      window_size: 60s

  # ── Admin API ───────────────────────────────────────────────────────────
  - path: "/api/admin/*"
    methods: [GET, POST, PUT, DELETE]
    upstream: admin-service
    strip_prefix: "/api/admin"
    require_roles: [admin]
    authz_rule: |
      has_role("admin") && (request.method == "GET" || has_role("super-admin"))
    rate_limit:
      requests_per_window: 50
      window_size: 60s
    cors:
      allowed_origins: ["https://${ADMIN_DOMAIN:-admin.example.com}"]
      allow_credentials: true

  # ── Partner API (API key auth) ──────────────────────────────────────────
  - path: "/api/partner/*"
    methods: [GET, POST]
    upstream: api-service
    strip_prefix: "/api/partner"
    auth_provider: "partner-keys"
    require_scopes: [read]
    rate_limit:
      requests_per_window: 100
      window_size: 60s
    cors:
      allowed_origins: []
      allow_credentials: false

  # ── WebSocket ───────────────────────────────────────────────────────────
  - path: "/ws/*"
    methods: [GET]
    upstream: realtime-service
    metadata:
      max_message_size: "16777216"

  # ── Health ──────────────────────────────────────────────────────────────
  - path: "/health"
    methods: [GET]
    upstream: api-service
    skip_auth: true

  - path: "/ready"
    methods: [GET]
    upstream: api-service
    skip_auth: true

# ============================================================================
# Upstreams
# ============================================================================
upstreams:
  - name: api-service
    lb_policy: "${LB_POLICY:-round_robin}"
    instances:
      - id: api-1
        host: "${API_HOST_1:-localhost}"
        port: ${API_PORT_1:-8081}
      - id: api-2
        host: "${API_HOST_2:-localhost}"
        port: ${API_PORT_2:-8082}
    health_check:
      type: http
      path: /health
      interval: 10s
      timeout: 5s
      healthy_threshold: 2
      unhealthy_threshold: 3
    circuit_breaker:
      error_threshold: 0.5
      min_requests: 10
      timeout: 30s

  - name: admin-service
    lb_policy: round_robin
    instances:
      - id: admin-1
        host: "${ADMIN_HOST:-localhost}"
        port: ${ADMIN_PORT:-8083}
    health_check:
      type: http
      path: /health
      interval: 15s
      timeout: 5s

  - name: realtime-service
    lb_policy: ip_hash
    instances:
      - id: ws-1
        host: "${WS_HOST:-localhost}"
        port: ${WS_PORT:-8085}

# ============================================================================
# Observability
# ============================================================================
observability:
  logging:
    level: "${LOG_LEVEL:-info}"
    format: json

  metrics:
    enabled: true
    endpoint: /metrics

  tracing:
    enabled: ${TRACING_ENABLED:-false}
    jaeger_endpoint: "${JAEGER_ENDPOINT:-http://localhost:14268/api/traces}"
