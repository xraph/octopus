---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: octopusgateways.gateway.octopus.io
spec:
  group: gateway.octopus.io
  names:
    categories: []
    kind: OctopusGateway
    plural: octopusgateways
    shortNames:
    - ogw
    singular: octopusgateway
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for OctopusGatewaySpec via `CustomResource`
        properties:
          spec:
            description: 'Gateway-level configuration: a logical Octopus gateway instance.'
            properties:
              defaultAuthProvider:
                description: Default auth provider applied to attached routes. Superseded by `defaultPolicy.authProvider`; retained for backward compatibility.
                nullable: true
                type: string
              defaultPolicy:
                description: Defaults inherited by every route attached to this gateway. An explicit value on a route always wins over the gateway default.
                nullable: true
                properties:
                  authProvider:
                    description: Default auth provider for routes that don't specify one.
                    nullable: true
                    type: string
                  cors:
                    description: Default CORS policy. Also answers preflight (`OPTIONS`) for the gateway's hostnames even when no specific route matches.
                    nullable: true
                    properties:
                      allowCredentials:
                        default: false
                        description: Whether credentials (cookies, auth headers) are allowed.
                        type: boolean
                      allowedHeaders:
                        default: []
                        description: Allowed request headers.
                        items:
                          type: string
                        type: array
                      allowedMethods:
                        default: []
                        description: Allowed HTTP methods.
                        items:
                          type: string
                        type: array
                      allowedOrigins:
                        default: []
                        description: Allowed origins (e.g. `https://app.example.com`, or `*`).
                        items:
                          type: string
                        type: array
                      maxAge:
                        default: 0
                        description: Preflight cache max-age in seconds.
                        format: uint64
                        minimum: 0.0
                        type: integer
                    type: object
                  rateLimit:
                    description: Default rate limit for routes without one.
                    nullable: true
                    properties:
                      requests:
                        description: Requests allowed per window.
                        format: uint32
                        minimum: 0.0
                        type: integer
                      windowSeconds:
                        description: Window length in seconds.
                        format: uint64
                        minimum: 0.0
                        type: integer
                    required:
                    - requests
                    - windowSeconds
                    type: object
                  timeoutSeconds:
                    description: Default per-request timeout (seconds) for routes without one.
                    format: uint64
                    minimum: 0.0
                    nullable: true
                    type: integer
                type: object
              farpBinding:
                default: false
                description: 'When `true`, this gateway is the FARP federation surface: services discovered via FARP are served under this gateway''s hostnames and inherit its `defaultPolicy` (auth/rate-limit/timeout). One source of truth instead of also configuring `farp.gateway`.'
                type: boolean
              gatewayClassName:
                description: The GatewayClass this gateway serves.
                nullable: true
                type: string
              hostnames:
                default: []
                description: 'Hostnames this virtual gateway owns (Gateway API syntax: exact `api.example.com` or wildcard `*.example.com`). A route whose host falls within this set attaches to this gateway and inherits its `defaultPolicy`. Empty means match any host (the implicit `default` gateway).'
                items:
                  type: string
                type: array
              isolation:
                default: shared
                description: 'Isolation tier: `shared` (runs in the edge process) or `dedicated` (rendered to its own, directly-reachable Octopus deployment).'
                enum:
                - shared
                - dedicated
                type: string
              listen:
                description: Listen address, e.g. `0.0.0.0:8080`.
                type: string
            required:
            - listen
            type: object
          status:
            description: The `.status` subresource shared by every Octopus CRD.
            nullable: true
            properties:
              conditions:
                description: Reconcile conditions (currently just `Accepted`).
                items:
                  description: A single status condition, wire-compatible with `metav1.Condition`.
                  properties:
                    lastTransitionTime:
                      description: RFC3339 timestamp of the last status transition.
                      nullable: true
                      type: string
                    message:
                      description: Human-readable detail.
                      type: string
                    observedGeneration:
                      description: '`.metadata.generation` the condition was computed from.'
                      format: int64
                      nullable: true
                      type: integer
                    reason:
                      description: Machine-readable, PascalCase reason for the condition's last transition.
                      type: string
                    status:
                      description: '`True`, `False`, or `Unknown`.'
                      type: string
                    type:
                      description: Condition type, e.g. `Accepted`.
                      type: string
                  required:
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: The `.metadata.generation` most recently reconciled.
                format: int64
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: OctopusGateway
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: octopusroutes.gateway.octopus.io
spec:
  group: gateway.octopus.io
  names:
    categories: []
    kind: OctopusRoute
    plural: octopusroutes
    shortNames:
    - ort
    singular: octopusroute
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for OctopusRouteSpec via `CustomResource`
        properties:
          spec:
            description: A full-fidelity Octopus route.
            properties:
              addPrefix:
                description: Add this prefix before proxying.
                nullable: true
                type: string
              authProvider:
                description: Named auth provider to enforce.
                nullable: true
                type: string
              authzRule:
                description: Authorization rule expression.
                nullable: true
                type: string
              convention:
                description: Convention for deriving the backend from the request host (multi-tenant subdomain routing). When set, this route becomes a single wildcard route (`*.<baseDomain>`) whose upstream is derived per request from the host.
                nullable: true
                properties:
                  backendStrategy:
                    description: 'Backend load-balancing: `ServiceDNS` (default) routes to the cluster Service DNS name; `EndpointSlice` watches the Service''s EndpointSlices and balances across pod IPs directly.'
                    nullable: true
                    type: string
                  baseDomain:
                    description: Base domain, e.g. `platform.com`. The route matches `*.<baseDomain>`.
                    type: string
                  defaultService:
                    description: Service name to use when `layout` has no `service` entry.
                    nullable: true
                    type: string
                  layout:
                    description: 'Label roles for the tenant prefix, left to right. Recognized values: `service`, `namespace` (alias `tenant`), `ignore`. For example `["service","namespace"]` maps `orders.acme.platform.com` to Service `orders` in namespace `acme`.'
                    items:
                      type: string
                    type: array
                  port:
                    description: Upstream port for the derived Service (default 80).
                    format: uint16
                    minimum: 0.0
                    nullable: true
                    type: integer
                  routeRules:
                    default: []
                    description: 'Path-split rules: after the host resolves to `{namespace, service}`, the first rule whose `pathPrefix` matches the request path overrides the service/port and may rewrite the path. This lets one wildcard tenant route send `<tenant>.<base>/api/*` to the tenant API and `<tenant>.<base>/*` to the tenant frontend — collapsing the per-tenant gateway hop. Evaluated in order; `/` matches everything, so place it last.'
                    items:
                      description: A path-prefix rule refining a convention-derived target (CRD form of [`octopus_router::ConventionRouteRule`]).
                      properties:
                        addPrefix:
                          description: Prefix to prepend after stripping.
                          nullable: true
                          type: string
                        pathPrefix:
                          description: Path prefix that triggers this rule (e.g. `/api`).
                          type: string
                        portOverride:
                          description: Override the upstream port.
                          format: uint16
                          minimum: 0.0
                          nullable: true
                          type: integer
                        serviceOverride:
                          description: Override the derived Service name.
                          nullable: true
                          type: string
                        stripPrefix:
                          default: false
                          description: Strip `pathPrefix` before forwarding.
                          type: boolean
                      required:
                      - pathPrefix
                      type: object
                    type: array
                  script:
                    description: Optional inline Rhai script mapping `host` → `#{namespace, service[, port]}`, overriding the label `layout` when it returns a mapping (otherwise the layout is used). Receives the request `host` as a string variable.
                    nullable: true
                    type: string
                  scriptRef:
                    description: Load the host-resolution Rhai script from a ConfigMap (ignored when an inline `script` is set). Cross-namespace refs require a `ReferenceGrant`.
                    nullable: true
                    properties:
                      key:
                        description: Data key within the ConfigMap.
                        type: string
                      name:
                        description: ConfigMap name.
                        type: string
                      namespace:
                        description: ConfigMap namespace (defaults to the route's namespace).
                        nullable: true
                        type: string
                    required:
                    - key
                    - name
                    type: object
                required:
                - baseDomain
                - layout
                type: object
              methods:
                default: []
                description: HTTP methods this route matches (empty = all).
                items:
                  type: string
                type: array
              parentRefs:
                default: []
                description: Names of `OctopusGateway`/`Gateway` resources this route attaches to.
                items:
                  type: string
                type: array
              path:
                description: Match path (supports `:param` and `*wildcard`).
                type: string
              plugins:
                default: []
                description: Ordered plugin chain (plugin ids).
                items:
                  type: string
                type: array
              priority:
                description: Explicit priority; higher wins on identical path collisions.
                format: int32
                nullable: true
                type: integer
              rateLimit:
                description: Per-route rate limit.
                nullable: true
                properties:
                  requests:
                    description: Requests allowed per window.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  windowSeconds:
                    description: Window length in seconds.
                    format: uint64
                    minimum: 0.0
                    type: integer
                required:
                - requests
                - windowSeconds
                type: object
              requireRoles:
                default: []
                description: Required roles.
                items:
                  type: string
                type: array
              requireScopes:
                default: []
                description: Required scopes.
                items:
                  type: string
                type: array
              scriptRef:
                description: Reference to a Rhai script (e.g. a ConfigMap name).
                nullable: true
                type: string
              skipAuth:
                default: false
                description: Skip authentication for this route.
                type: boolean
              stripPrefix:
                description: Strip this prefix before proxying.
                nullable: true
                type: string
              timeoutSeconds:
                description: Per-route timeout in seconds.
                format: uint64
                minimum: 0.0
                nullable: true
                type: integer
              upstream:
                description: Target upstream cluster (an `OctopusUpstream` name or discovered service).
                type: string
            required:
            - path
            - upstream
            type: object
          status:
            description: The `.status` subresource shared by every Octopus CRD.
            nullable: true
            properties:
              conditions:
                description: Reconcile conditions (currently just `Accepted`).
                items:
                  description: A single status condition, wire-compatible with `metav1.Condition`.
                  properties:
                    lastTransitionTime:
                      description: RFC3339 timestamp of the last status transition.
                      nullable: true
                      type: string
                    message:
                      description: Human-readable detail.
                      type: string
                    observedGeneration:
                      description: '`.metadata.generation` the condition was computed from.'
                      format: int64
                      nullable: true
                      type: integer
                    reason:
                      description: Machine-readable, PascalCase reason for the condition's last transition.
                      type: string
                    status:
                      description: '`True`, `False`, or `Unknown`.'
                      type: string
                    type:
                      description: Condition type, e.g. `Accepted`.
                      type: string
                  required:
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: The `.metadata.generation` most recently reconciled.
                format: int64
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: OctopusRoute
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
