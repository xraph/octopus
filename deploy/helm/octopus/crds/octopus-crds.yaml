apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: octopuspolicies.gateway.octopus.io
spec:
  group: gateway.octopus.io
  names:
    categories: []
    kind: OctopusPolicy
    plural: octopuspolicies
    shortNames:
    - opol
    singular: octopuspolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for OctopusPolicySpec via `CustomResource`
        properties:
          spec:
            description: A GEP-713 policy attaching Octopus-specific behavior onto a target resource (typically a standard Gateway API `HTTPRoute`/`Gateway`).
            properties:
              authProvider:
                description: Auth provider to enforce on the target's routes.
                nullable: true
                type: string
              overrideRoute:
                default: false
                description: Override semantics (true = override route-inline settings; default = fill gaps).
                type: boolean
              plugins:
                default: []
                description: Ordered plugin chain to apply.
                items:
                  type: string
                type: array
              rateLimit:
                description: Rate limit to apply.
                nullable: true
                properties:
                  requests:
                    description: Requests allowed per window.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  windowSeconds:
                    description: Window length in seconds.
                    format: uint64
                    minimum: 0.0
                    type: integer
                required:
                - requests
                - windowSeconds
                type: object
              scriptRef:
                description: Reference to a Rhai script.
                nullable: true
                type: string
              targetRef:
                description: The resource this policy attaches to.
                properties:
                  group:
                    description: API group of the target (e.g. `gateway.networking.k8s.io`).
                    type: string
                  kind:
                    description: Kind of the target (e.g. `HTTPRoute`, `Gateway`).
                    type: string
                  name:
                    description: Name of the target resource.
                    type: string
                  sectionName:
                    description: Optional section (e.g. a specific listener or route rule).
                    nullable: true
                    type: string
                required:
                - group
                - kind
                - name
                type: object
            required:
            - targetRef
            type: object
          status:
            description: The `.status` subresource shared by every Octopus CRD.
            nullable: true
            properties:
              conditions:
                description: Reconcile conditions (currently just `Accepted`).
                items:
                  description: A single status condition, wire-compatible with `metav1.Condition`.
                  properties:
                    lastTransitionTime:
                      description: RFC3339 timestamp of the last status transition.
                      nullable: true
                      type: string
                    message:
                      description: Human-readable detail.
                      type: string
                    observedGeneration:
                      description: '`.metadata.generation` the condition was computed from.'
                      format: int64
                      nullable: true
                      type: integer
                    reason:
                      description: Machine-readable, PascalCase reason for the condition's last transition.
                      type: string
                    status:
                      description: '`True`, `False`, or `Unknown`.'
                      type: string
                    type:
                      description: Condition type, e.g. `Accepted`.
                      type: string
                  required:
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: The `.metadata.generation` most recently reconciled.
                format: int64
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: OctopusPolicy
        type: object
