                      format: int64
                      nullable: true
                      type: integer
                    reason:
                      description: Machine-readable, PascalCase reason for the condition's last transition.
                      type: string
                    status:
                      description: '`True`, `False`, or `Unknown`.'
                      type: string
                    type:
                      description: Condition type, e.g. `Accepted`.
                      type: string
                  required:
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: The `.metadata.generation` most recently reconciled.
                format: int64
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: OctopusUpstream
        type: object
    served: true
    storage: true
    subresources:
      status: {}
