---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: octopusgateways.gateway.octopus.io
spec:
  group: gateway.octopus.io
  names:
    categories: []
    kind: OctopusGateway
    plural: octopusgateways
    shortNames:
    - ogw
    singular: octopusgateway
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for OctopusGatewaySpec via `CustomResource`
        properties:
          spec:
            description: 'Gateway-level configuration: a logical Octopus gateway instance.'
            properties:
              defaultAuthProvider:
                description: Default auth provider applied to attached routes.
                nullable: true
                type: string
              gatewayClassName:
                description: The GatewayClass this gateway serves.
                nullable: true
                type: string
              listen:
                description: Listen address, e.g. `0.0.0.0:8080`.
                type: string
            required:
            - listen
            type: object
        required:
        - spec
        title: OctopusGateway
        type: object
    served: true
    storage: true
    subresources: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: octopusroutes.gateway.octopus.io
spec:
  group: gateway.octopus.io
  names:
    categories: []
    kind: OctopusRoute
    plural: octopusroutes
    shortNames:
    - ort
    singular: octopusroute
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for OctopusRouteSpec via `CustomResource`
        properties:
          spec:
            description: A full-fidelity Octopus route.
            properties:
              addPrefix:
                description: Add this prefix before proxying.
                nullable: true
                type: string
              authProvider:
                description: Named auth provider to enforce.
                nullable: true
                type: string
              authzRule:
                description: Authorization rule expression.
                nullable: true
                type: string
              convention:
                description: Convention for deriving the backend from the request host (multi-tenant subdomain routing). When set, this route becomes a single wildcard route (`*.<baseDomain>`) whose upstream is derived per request from the host.
                nullable: true
                properties:
                  backendStrategy:
                    description: 'Backend load-balancing: `ServiceDNS` (default) routes to the cluster Service DNS name; `EndpointSlice` watches the Service''s EndpointSlices and balances across pod IPs directly.'
                    nullable: true
                    type: string
                  baseDomain:
                    description: Base domain, e.g. `platform.com`. The route matches `*.<baseDomain>`.
                    type: string
                  defaultService:
                    description: Service name to use when `layout` has no `service` entry.
                    nullable: true
                    type: string
                  layout:
                    description: 'Label roles for the tenant prefix, left to right. Recognized values: `service`, `namespace` (alias `tenant`), `ignore`. For example `["service","namespace"]` maps `orders.acme.platform.com` to Service `orders` in namespace `acme`.'
                    items:
                      type: string
                    type: array
                  port:
                    description: Upstream port for the derived Service (default 80).
                    format: uint16
                    minimum: 0.0
                    nullable: true
                    type: integer
                  script:
                    description: Optional inline Rhai script mapping `host` â†’ `#{namespace, service[, port]}`, overriding the label `layout` when it returns a mapping (otherwise the layout is used). Receives the request `host` as a string variable.
                    nullable: true
                    type: string
                  scriptRef:
                    description: Load the host-resolution Rhai script from a ConfigMap (ignored when an inline `script` is set). Cross-namespace refs require a `ReferenceGrant`.
                    nullable: true
                    properties:
                      key:
                        description: Data key within the ConfigMap.
                        type: string
                      name:
                        description: ConfigMap name.
                        type: string
                      namespace:
                        description: ConfigMap namespace (defaults to the route's namespace).
                        nullable: true
                        type: string
                    required:
                    - key
                    - name
                    type: object
                required:
                - baseDomain
                - layout
                type: object
              methods:
                default: []
                description: HTTP methods this route matches (empty = all).
                items:
                  type: string
                type: array
              parentRefs:
                default: []
                description: Names of `OctopusGateway`/`Gateway` resources this route attaches to.
                items:
                  type: string
                type: array
              path:
                description: Match path (supports `:param` and `*wildcard`).
                type: string
              plugins:
                default: []
                description: Ordered plugin chain (plugin ids).
                items:
                  type: string
                type: array
              priority:
                description: Explicit priority; higher wins on identical path collisions.
                format: int32
                nullable: true
                type: integer
              rateLimit:
                description: Per-route rate limit.
                nullable: true
                properties:
                  requests:
                    description: Requests allowed per window.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  windowSeconds:
                    description: Window length in seconds.
                    format: uint64
                    minimum: 0.0
                    type: integer
                required:
                - requests
                - windowSeconds
                type: object
              requireRoles:
                default: []
                description: Required roles.
                items:
                  type: string
                type: array
              requireScopes:
                default: []
                description: Required scopes.
                items:
                  type: string
                type: array
              scriptRef:
                description: Reference to a Rhai script (e.g. a ConfigMap name).
                nullable: true
                type: string
              skipAuth:
                default: false
                description: Skip authentication for this route.
                type: boolean
              stripPrefix:
                description: Strip this prefix before proxying.
                nullable: true
                type: string
              timeoutSeconds:
                description: Per-route timeout in seconds.
                format: uint64
                minimum: 0.0
                nullable: true
                type: integer
              upstream:
                description: Target upstream cluster (an `OctopusUpstream` name or discovered service).
                type: string
            required:
            - path
            - upstream
            type: object
        required:
        - spec
        title: OctopusRoute
        type: object
    served: true
    storage: true
    subresources: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: octopusupstreams.gateway.octopus.io
spec:
  group: gateway.octopus.io
  names:
    categories: []
    kind: OctopusUpstream
    plural: octopusupstreams
    shortNames:
    - oup
    singular: octopusupstream
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for OctopusUpstreamSpec via `CustomResource`
        properties:
          spec:
            description: An upstream cluster with explicit targets and load-balancing policy.
            properties:
              lbStrategy:
                description: Load-balancing strategy (e.g. `round_robin`, `least_conn`, `ip_hash`).
                nullable: true
                type: string
              targets:
                default: []
                description: Explicit upstream targets.
                items:
                  description: A weighted upstream target.
                  properties:
                    host:
                      description: Host or IP.
                      type: string
                    port:
                      description: Port.
                      format: uint16
                      minimum: 0.0
                      type: integer
                    weight:
                      description: Relative weight for weighted load balancing.
                      format: uint32
                      minimum: 0.0
                      nullable: true
                      type: integer
                  required:
                  - host
                  - port
                  type: object
                type: array
            type: object
        required:
        - spec
        title: OctopusUpstream
        type: object
    served: true
    storage: true
    subresources: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: octopuspolicies.gateway.octopus.io
spec:
  group: gateway.octopus.io
  names:
    categories: []
    kind: OctopusPolicy
    plural: octopuspolicies
    shortNames:
    - opol
    singular: octopuspolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for OctopusPolicySpec via `CustomResource`
        properties:
          spec:
            description: A GEP-713 policy attaching Octopus-specific behavior onto a target resource (typically a standard Gateway API `HTTPRoute`/`Gateway`).
            properties:
              authProvider:
                description: Auth provider to enforce on the target's routes.
                nullable: true
                type: string
              overrideRoute:
                default: false
                description: Override semantics (true = override route-inline settings; default = fill gaps).
                type: boolean
              plugins:
                default: []
                description: Ordered plugin chain to apply.
                items:
                  type: string
                type: array
              rateLimit:
                description: Rate limit to apply.
                nullable: true
                properties:
                  requests:
                    description: Requests allowed per window.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  windowSeconds:
                    description: Window length in seconds.
                    format: uint64
                    minimum: 0.0
                    type: integer
                required:
                - requests
                - windowSeconds
                type: object
              scriptRef:
                description: Reference to a Rhai script.
                nullable: true
                type: string
              targetRef:
                description: The resource this policy attaches to.
                properties:
                  group:
                    description: API group of the target (e.g. `gateway.networking.k8s.io`).
                    type: string
                  kind:
                    description: Kind of the target (e.g. `HTTPRoute`, `Gateway`).
                    type: string
                  name:
                    description: Name of the target resource.
                    type: string
                  sectionName:
                    description: Optional section (e.g. a specific listener or route rule).
                    nullable: true
                    type: string
                required:
                - group
                - kind
                - name
                type: object
            required:
            - targetRef
            type: object
        required:
        - spec
        title: OctopusPolicy
        type: object
    served: true
    storage: true
    subresources: {}
