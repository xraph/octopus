{{- if .Values.rbac.create -}}
{{- if .Values.rbac.clusterScoped }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "octopus.fullname" . }}
  labels:
    {{- include "octopus.labels" . | nindent 4 }}
rules:
  # Service metadata + legacy Endpoints fallback.
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  # ConfigMaps backing convention host-resolution scripts (script_ref).
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Primary discovery source — reflects pod scale up/down.
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  # Standard Gateway API resources the operator reconciles.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes", "grpcroutes", "gateways", "gatewayclasses"]
    verbs: ["get", "list", "watch"]
  # Custom Octopus CRDs.
  - apiGroups: ["gateway.octopus.io"]
    resources: ["octopusgateways", "octopusroutes", "octopusupstreams", "octopuspolicies"]
    verbs: ["get", "list", "watch"]
  # ReferenceGrants + TLS Secrets (only needed for operator-managed TLS termination).
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["referencegrants"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Status writeback: Accepted/Invalid conditions on reconciled resources.
  - apiGroups: ["gateway.octopus.io"]
    resources: ["octopusgateways/status", "octopusroutes/status", "octopusupstreams/status", "octopuspolicies/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses/status", "gateways/status", "httproutes/status", "grpcroutes/status"]
    verbs: ["get", "patch", "update"]
  # Leader election: a single coordination Lease across operator replicas.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "octopus.fullname" . }}
  labels:
    {{- include "octopus.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "octopus.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "octopus.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "octopus.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "octopus.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  # Leader election: a single coordination Lease in this namespace.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "octopus.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "octopus.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "octopus.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "octopus.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
