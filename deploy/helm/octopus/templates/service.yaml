apiVersion: v1
kind: Service
metadata:
  name: {{ include "octopus.fullname" . }}
  labels:
    {{- include "octopus.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  # Keep NotReady (draining) pods out of the EndpointSlice so pre_stop_delay
  # actually drains traffic before the socket closes.
  publishNotReadyAddresses: false
  selector:
    {{- include "octopus.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    - name: admin
      port: {{ .Values.service.adminPort }}
      targetPort: admin
      protocol: TCP
